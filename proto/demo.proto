syntax = "proto3";

package demo;

service DemoService {
  // 1. Unary
  rpc SayHello (HelloRequest) returns (HelloReply);

  // 2. Server streaming
  rpc ListNumbers (RangeRequest) returns (stream NumberReply);

  // 3. Client streaming
  rpc SumNumbers (stream NumberRequest) returns (SumReply);

  // 4. Bidirecional streaming
  rpc Chat (stream ChatMessage) returns (stream ChatMessage);
}

message HelloRequest  { string name    = 1; }
message HelloReply    { string message = 1; }

message RangeRequest  { int32 start = 1; int32 end = 2; }
message NumberReply   { int32 value = 1; }

message NumberRequest { int32 value = 1; }
message SumReply      { int32 total = 1; }

message ChatMessage   { string user = 1; string text = 2; }