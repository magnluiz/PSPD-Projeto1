apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: pspd/gateway:latest
          imagePullPolicy: Never          # Minikube local image
          ports:
            - containerPort: 8080
          env:
            - name: SERVICE_A_ADDR
              value: "service-a:50051"
            - name: SERVICE_B_ADDR
              value: "service-b:50052"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /add?a=1&b=1
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: NodePort          # expõe para acesso externo no Minikube
